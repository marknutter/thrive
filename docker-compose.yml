services:
  # ── Development ────────────────────────────────────────────────────────────
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: thrive-dev
    ports:
      - "${DEV_PORT:-3022}:3022"
    volumes:
      - .:/app
      - /app/node_modules
      - ./data:/app/data
    env_file: .env
    environment:
      NODE_ENV: development
      DATABASE_PATH: /app/data/thrive.db
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3022}
      APP_URL: ${APP_URL:-http://localhost:3022}
      WATCHPACK_POLLING: "true"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  # ── Production ─────────────────────────────────────────────────────────────
  prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thrive
    restart: unless-stopped
    ports:
      - "3022:3022"
    volumes:
      - thrive_data:/data
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_PATH: /data/thrive.db
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      BETTER_AUTH_URL: ${APP_URL:-http://localhost:3022}
      APP_URL: ${APP_URL:-http://localhost:3022}
      APP_NAME: ${APP_NAME:-Thrive}
      # OAuth (optional)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      # Email
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # AI + Voice: loaded from env_file, don't override with host env vars

volumes:
  thrive_data:
